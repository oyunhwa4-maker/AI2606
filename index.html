<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI 핵심 개념을 문제와 해설로 학습하는 CBT 페이지">
  <title>AICE STUDY | 문제 학습</title>
  <link rel="stylesheet" href="./css/common.css">
  <link rel="stylesheet" href="./css/index.css">
  <script defer src="./js/questions.js"></script>
  <script defer src="./js/storage.js"></script>
  <script defer src="./js/index.js"></script>
</head>
<body>
  <header class="site-head">
    <a class="brand" href="./index.html" aria-label="AICE STUDY 문제 목록">
      <span class="brand-mark">A</span>
      <span><strong>AICE STUDY</strong><small>AI 학습 CBT</small></span>
    </a>
    <nav aria-label="주요 메뉴">
      <a class="is-active" href="./index.html">문제 학습</a>
      <a href="./wrong-note.html">오답노트 <span class="nav-count" data-wrong-count hidden>0</span></a>
    </nav>
  </header>

  <main class="content">
    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow">TODAY'S LEARNING</p>
        <h1>AI 핵심 개념,<br><em>문제로 익혀보세요.</em></h1>
        <p>짧은 문제 풀이와 즉시 제공되는 해설로<br>헷갈리는 개념을 빠르게 정리할 수 있습니다.</p>
        <div class="hero-actions">
          <a class="btn btn-main" href="./solve.html?id=ai-001">첫 문제 풀기 <span>→</span></a>
          <a class="review-link" href="./wrong-note.html">오답 <b data-wrong-count>0</b>개 복습하기</a>
        </div>
      </div>
      <div class="hero-art" aria-hidden="true">
        <span class="orbit orbit-a"></span><span class="orbit orbit-b"></span>
        <div class="ai-card"><span>AI</span><strong>5</strong><small>오늘의 문제</small></div>
        <i class="float-tag tag-a">DATA</i><i class="float-tag tag-b">ETHICS</i>
      </div>
    </section>

    <section class="learning" aria-labelledby="question-title">
      <div class="section-head">
        <div><p class="eyebrow">QUESTION LIST</p><h2 id="question-title">오늘의 학습 문제</h2></div>
        <p>총 <strong id="total-count">0</strong>문제</p>
      </div>
      <div class="filters" role="tablist" aria-label="문제 카테고리" id="category-filters"></div>
      <div class="question-grid" id="question-list" aria-live="polite"></div>
    </section>
  </main>
</body>
</html>

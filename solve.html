<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI 문제 풀이와 해설 확인">
  <title>AICE STUDY | 문제 풀이</title>
  <link rel="stylesheet" href="./css/common.css">
  <link rel="stylesheet" href="./css/solve.css">
  <script defer src="./js/questions.js"></script>
  <script defer src="./js/storage.js"></script>
  <script defer src="./js/solve.js"></script>
</head>
<body>
  <header class="site-head">
    <a class="brand" href="./index.html" aria-label="AICE STUDY 문제 목록">
      <span class="brand-mark">A</span><span><strong>AICE STUDY</strong><small>AI 학습 CBT</small></span>
    </a>
    <nav aria-label="주요 메뉴">
      <a class="is-active" href="./index.html">문제 학습</a>
      <a href="./wrong-note.html">오답노트 <span class="nav-count" data-wrong-count hidden>0</span></a>
    </nav>
  </header>

  <main class="solve-wrap">
    <a class="back-link" href="./index.html">← 문제 목록</a>
    <section id="not-found" class="state-card" hidden>
      <span class="state-icon">?</span><p class="eyebrow">INVALID QUESTION</p>
      <h1>문제를 찾을 수 없습니다.</h1><p>주소가 잘못되었거나 삭제된 문제입니다.</p>
      <a class="btn btn-main" href="./index.html">문제 목록으로</a>
    </section>

    <div id="quiz-area" hidden>
      <section class="progress-box" aria-label="문제 풀이 진행률">
        <div><span>학습 진행</span><strong id="progress-text">1 / 5</strong></div>
        <div class="progress-track"><span id="progress-bar"></span></div>
      </section>

      <article class="quiz-card">
        <div class="meta-row">
          <span class="q-num" id="q-num">Q1</span><span class="chip chip-category" id="q-category"></span>
          <span class="chip" id="q-level"></span><span class="chip chip-retry" id="retry-chip" hidden>오답 재풀이</span>
        </div>
        <h1 id="q-title"></h1><p class="guide">가장 적절한 답을 하나 선택하세요.</p>
        <form id="answer-form" novalidate>
          <fieldset id="option-list"><legend class="sr-only">답안 선택</legend></fieldset>
          <p class="form-notice" id="form-notice" role="alert"></p>
          <button class="btn btn-main submit-btn" type="submit" id="submit-button">답안 제출</button>
        </form>

        <section class="result-panel" id="result-panel" aria-live="polite" hidden>
          <div class="result-title"><span id="result-icon"></span><div><strong id="result-heading"></strong><p id="result-summary"></p></div></div>
          <div class="explanation"><b>해설</b><p id="explanation-text"></p></div>
          <div class="result-actions" id="result-actions"></div>
        </section>
      </article>
    </div>
  </main>
</body>
</html>
